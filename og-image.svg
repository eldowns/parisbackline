<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow-lg"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="glow-md"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow-sm"><feGaussianBlur stdDeviation="30"/></filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a07830"/>
      <stop offset="50%" stop-color="#e8c878"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#09090f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0.85"/>
    </radialGradient>
    <clipPath id="clip"><rect width="1200" height="630"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090f"/>

  <!-- Stage atmosphere -->
  <g clip-path="url(#clip)">
    <!-- Center warm glow -->
    <ellipse cx="600" cy="280" rx="500" ry="300" fill="#c8a44a" opacity="0.08" filter="url(#glow-lg)"/>
    <!-- Left warm -->
    <ellipse cx="180" cy="180" rx="280" ry="200" fill="#c8a44a" opacity="0.06" filter="url(#glow-lg)"/>
    <!-- Right warm -->
    <ellipse cx="1020" cy="200" rx="260" ry="180" fill="#c8a44a" opacity="0.05" filter="url(#glow-lg)"/>
    <!-- Floor glow -->
    <ellipse cx="600" cy="580" rx="500" ry="120" fill="#c8a44a" opacity="0.07" filter="url(#glow-md)"/>
  </g>

  <!-- Truss silhouette -->
  <g opacity="0.2">
    <!-- Left tower -->
    <line x1="100" y1="0" x2="100" y2="630" stroke="#c8a44a" stroke-width="1.5"/>
    <!-- Right tower -->
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#c8a44a" stroke-width="1.5"/>
    <!-- Top chord -->
    <line x1="100" y1="40" x2="1100" y2="40" stroke="#c8a44a" stroke-width="1.5"/>
    <!-- Bottom chord -->
    <line x1="100" y1="56" x2="1100" y2="56" stroke="#c8a44a" stroke-width="1"/>
  </g>

  <!-- Fixture beams -->
  <g opacity="0.04">
    <polygon points="300,60 240,400 360,400" fill="#c8a44a"/>
    <polygon points="500,60 430,400 570,400" fill="#c8a44a"/>
    <polygon points="600,60 520,420 680,420" fill="#c8a44a"/>
    <polygon points="700,60 630,400 770,400" fill="#c8a44a"/>
    <polygon points="900,60 840,400 960,400" fill="#c8a44a"/>
  </g>

  <!-- Fixture heads -->
  <g opacity="0.3">
    <circle cx="300" cy="60" r="5" fill="#c8a44a"/>
    <circle cx="500" cy="60" r="5" fill="#c8a44a"/>
    <circle cx="600" cy="60" r="6" fill="#c8a44a"/>
    <circle cx="700" cy="60" r="5" fill="#c8a44a"/>
    <circle cx="900" cy="60" r="5" fill="#c8a44a"/>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vig)"/>

  <!-- Gold rule -->
  <rect x="570" y="190" width="60" height="1.5" fill="#c8a44a" opacity="0.6"/>

  <!-- Eyebrow -->
  <text x="600" y="230" text-anchor="middle" fill="#c8a44a" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="6" opacity="0.7">GREATER LOS ANGELES  ·  WIRELESS SPECIALISTS</text>

  <!-- Main wordmark -->
  <text x="600" y="330" text-anchor="middle" fill="url(#gold)" font-family="system-ui,-apple-system,sans-serif" font-size="96" font-weight="800" letter-spacing="4">PARIS</text>
  <text x="600" y="410" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,-apple-system,sans-serif" font-size="96" font-weight="800" letter-spacing="4">BACKLINE</text>

  <!-- Subtitle -->
  <text x="600" y="468" text-anchor="middle" fill="#94a3b8" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="300" letter-spacing="1" opacity="0.7">Professional wireless systems and audio production equipment</text>

  <!-- Bottom rule -->
  <rect x="540" y="498" width="120" height="1" fill="#c8a44a" opacity="0.25"/>

  <!-- Service tags -->
  <text x="600" y="540" text-anchor="middle" fill="#c8a44a" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" letter-spacing="4" opacity="0.5">SENNHEISER  ·  MIDAS  ·  ALLEN &amp; HEATH  ·  NORD</text>

  <!-- URL -->
  <text x="600" y="600" text-anchor="middle" fill="#94a3b8" font-family="system-ui,-apple-system,sans-serif" font-size="11" letter-spacing="2" opacity="0.3">PARISBACKLINE.COM</text>
</svg>
